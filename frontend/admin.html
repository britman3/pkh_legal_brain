<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKH Legal Brain - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 6px;
            flex: 1;
        }
        .stat-label {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;
        }
        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 10px 20px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #34495e;
        }
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background: #2c3e50;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 500;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .download-btn {
            padding: 6px 12px;
            font-size: 13px;
            background: #27ae60;
        }
        .download-btn:hover {
            background: #229954;
        }
        .cost {
            color: #e74c3c;
            font-weight: 500;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        .last-updated {
            color: #6c757d;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PKH Legal Brain - Admin Dashboard</h1>
        <p style="color: #6c757d; margin-bottom: 20px;">Analysis History &amp; Costs</p>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Analyses</div>
                <div class="stat-value" id="totalCount">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Cost</div>
                <div class="stat-value cost" id="totalCost">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Data Processed</div>
                <div class="stat-value" id="totalSize">0 MB</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="loadData()">🔄 Refresh</button>
            <div class="auto-refresh">
                <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()">
                <label for="autoRefresh">Auto-refresh every 30s</label>
            </div>
        </div>

        <div class="last-updated" id="lastUpdated"></div>

        <div id="loading" class="loading">Loading...</div>
        <table id="dataTable" style="display: none;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Property Address</th>
                    <th>Filename</th>
                    <th>Size (MB)</th>
                    <th>Cost (USD)</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <script>
        let autoRefreshInterval = null;

        async function loadData() {
            try {
                const response = await fetch('/api/analyze/list');
                const data = await response.json();
                
                // Update stats
                document.getElementById('totalCount').textContent = data.total;
                
                const totalCost = data.analyses.reduce((sum, a) => sum + a.total_cost_usd, 0);
                document.getElementById('totalCost').textContent = '$' + totalCost.toFixed(2);
                
                const totalSize = data.analyses.reduce((sum, a) => sum + a.file_size_mb, 0);
                document.getElementById('totalSize').textContent = totalSize.toFixed(2) + ' MB';

                // Build table
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                
                data.analyses.forEach(analysis => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${analysis.id}</td>
                        <td>${analysis.property_address || '<em>Not extracted</em>'}</td>
                        <td>${analysis.filename}</td>
                        <td>${analysis.file_size_mb}</td>
                        <td class="cost">$${analysis.total_cost_usd}</td>
                        <td>${new Date(analysis.created_at).toLocaleString()}</td>
                        <td>
                            <button class="download-btn" onclick="downloadPDF(${analysis.id})">
                                📄 Download PDF
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                // Show table, hide loading
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dataTable').style.display = 'table';
                
                // Update timestamp
                document.getElementById('lastUpdated').textContent = 
                    'Last updated: ' + new Date().toLocaleString();
                    
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').textContent = 'Error loading data. Please refresh.';
            }
        }

        function downloadPDF(analysisId) {
            window.open(`/api/analyze/download-pdf/${analysisId}`, '_blank');
        }

        function toggleAutoRefresh() {
            const checkbox = document.getElementById('autoRefresh');
            if (checkbox.checked) {
                autoRefreshInterval = setInterval(loadData, 30000); // 30 seconds
            } else {
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                }
            }
        }

        // Load data on page load
        loadData();
    </script>
</body>
</html>
